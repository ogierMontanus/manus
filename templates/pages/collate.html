<?xml version="1.0" encoding="UTF-8"?>
<html>
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes"/>
        <link rel="shortcut icon" type="image/x-icon" href="resources/images/favicon.ico"/>
        <link rel="shortcut icon" type="image/png" href="resources/images/favicon-16.png" sizes="16x16"/>
        <link rel="shortcut icon" type="image/png" href="resources/images/favicon-24.png" sizes="24x24"/>
        <link rel="shortcut icon" type="image/png" href="resources/images/favicon-32.png" sizes="32x32"/>
        <link rel="shortcut icon" type="image/png" href="resources/images/favicon-64.png" sizes="64x64"/>

        <title data-template="config:app-title"/>
        <meta name="description" content="CollateX juxta-collation view"/>
        <meta name="pb-template" content="collate.html"/>

        <link rel="stylesheet" type="text/css" href="resources/fonts/font.css"/>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Oswald&amp;display=swap"/>
        <link rel="stylesheet" href="resources/css/theme.css"/>

        <script type="module" src="pb-components-bundle.js" data-template="pages:load-components"></script>
        <script src="resources/scripts/collate.js"></script>
    </head>

    <body>
        <pb-page data-template="pages:pb-page" unresolved="unresolved"
                 locales="resources/i18n/{{ns}}/{{lng}}.json" require-language="require-language">
            <pb-document id="document1" data-template="pages:pb-document"/>
            <app-drawer-layout force-narrow="force-narrow">
                <app-drawer data-template="templates:include" data-template-path="templates/drawer.html"/>
                <app-header-layout>
                    <app-header slot="header" reveals="reveals" fixed="fixed" effects="waterfall">
                        <app-toolbar data-template="templates:include" data-template-path="templates/menu.html"/>
                        <app-toolbar data-template="templates:include" data-template-path="templates/toolbar.html"/>
                    </app-header>
                    <main class="content-body">
                        <section class="breadcrumbs">
                            <pb-view id="title-view1" src="document1"
                                     xpath="//teiHeader/fileDesc/titleStmt/title" view="single">
                                <pb-param name="header" value="short"/>
                            </pb-view>
                        </section>
                        <pb-load id="collation"
                                 url="api/document/{doc}/collation"
                                 src="document1"/>
                    </main>
                </app-header-layout>
            </app-drawer-layout>
        </pb-page>
        <div class="splash"/>

        <script>
            // collate.js installs its setup as window.onload. When the
            // collation fragment is injected by pb-load, re-run that setup
            // so checkbox toggles and shaft-icon popups are wired up
            // against the freshly-inserted DOM.
            var __collateInit = window.onload;
            window.onload = null;
            window.addEventListener('load', function() {
                if (typeof pbEvents !== 'undefined') {
                    pbEvents.subscribe('pb-end-update', ['collation'], function() {
                        if (typeof __collateInit === 'function') __collateInit();
                    });
                }
            });
        </script>
    </body>
</html>
